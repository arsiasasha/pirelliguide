<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're In — Pirelli Guide</title>
<link rel="icon" type="image/png" href="/pirelli-guide-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --yellow: #FFCD00; --black: #080808; --white: #F0EDE8; --dim: #303030; }
body { background: var(--black); color: var(--white); font-family: 'Barlow', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
.mark { font-family: 'Cormorant Garamond', serif; font-size: 72px; color: var(--yellow); line-height: 1; margin-bottom: 24px; }
h1 { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: clamp(36px, 6vw, 64px); line-height: 1; margin-bottom: 16px; }
h1 em { color: var(--yellow); font-style: italic; }
p { font-size: 16px; color: #ccc; font-weight: 300; line-height: 1.8; max-width: 480px; margin-bottom: 40px; }
.btn { background: var(--yellow); color: var(--black); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: .25em; text-transform: uppercase; padding: 16px 34px; text-decoration: none; display: inline-block; }
.footer-note { margin-top: 48px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: #555; }
</style>
</head>
<body>
  <div class="mark">✓</div>
  <h1>You're <em>In.</em></h1>
  <p>You'll hear from us when something earns a spot on the list. That's it. No noise, no newsletters — just good food intel when it matters.</p>
  <a href="/" class="btn">See the Guide</a>
  <div class="footer-note">The Pirelli Guide — Not affiliated with Pirelli S.p.A. (yet)</div>
</body>
</html>
